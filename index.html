<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <link href="./index.css?v=1.0.2" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
      integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3"
      crossorigin="anonymous"
    />

    <title>Lost Ark Calculadora De Item Level Por Honing</title>
  </head>
  <body class="pt-4 p-2">
    <div class="container">
      <div class="card card-geral">
        <div class="card-header">
          <h4 class="card-title">Seleção Geral</h4>
        </div>
        <div class="card-body">
          <div class="d-flex form-group">
            <select id="all-tier" class="form-control tier">
              <option value="1" >T1</option>
              <option value="2" >T2</option>
              <option value="3" selected>T3</option>
            <select>
            <select id="all-type" class="form-control type">
              <option value="0" >Rare / Epic</option>
              <option value="1" selected>Legendary +</option>
            <select>
            <input id="all-value" class="form-control" type="number" step="1" min="0" value="6" />
          </div>
          <div class="alert alert-info mt-3">  
            <small>Mudanças aqui alteram todos os valores dos equipamentos abaixo</small>
          </div>
        </div>
      </div>
      <br/>
      <div class="card">
        <div class="card-header">
          <h4 class="card-title">Nível de Honing</h4>
        </div>
        <div id="conteudo" class="card-body">

        </div>
      </div>
    </div>
  </body>
  <script type="text/javascript" src="./index.js?v=1.0.2"></script>
</html>
