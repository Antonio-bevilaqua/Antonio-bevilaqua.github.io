<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <link href="./index.css?v=1.0.1" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
      integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.min.js"
      integrity="sha384-QJHtvGhmr9XOIpI6YVutG+2QOK9T+ZnN4kzFN1RtK3zEFEIsxhlmWl5/YESvpZ13"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <div id="conteudo" class="container">
      <div class="form-group">
        <label>Seleção geral</label>
        <div class="d-flex">
          <select id="all-tier" class="form-control tier">
            <option value="2" >T2</option>
            <option value="3" selected>T3</option>
          <select>
          <select id="all-type" class="form-control type">
            <option value="0" >Rare / Epic</option>
            <option value="1" selected>Legendary +</option>
          <select>
          <input id="all-value" class="form-control" type="number" step="1" min="0" value="6" />
        </div>
      </div>
      <br/>
      <hr/>
      <br/>
    </div>
  </body>
  <script type="text/javascript" src="./index.js?v=1.0.1"></script>
</html>
